max_steps_per_run: 30
max_tokens_per_step: 8000
context_warn_pct: 0.80

# Weighted step budget — each tool call deducts its weight from the budget.
# Heavy tools (writes, bash) cost more than reads/searches.
tool_weights:
  Write: 2.0
  Edit: 1.5
  MultiEdit: 2.5
  Bash: 1.0
  Agent: 5.0
  Read: 0.25
  Glob: 0.1
  Grep: 0.1
  WebFetch: 0.5
  WebSearch: 0.5
  default: 1.0

# Per-phase step budgets (weighted). Overrides max_steps_per_run when set.
phase_step_budgets:
  plan: 20.0
  execute: 60.0
  verify: 20.0
  ship: 10.0

# When plan steps are parsed from ExitPlanMode, max_steps is set to
# len(plan_steps) * this multiplier (minimum: max_steps_per_run).
plan_steps_multiplier: 3.0

# Plan progression control:
# plan_approval_gate true: require /approve before execute phase
# plan_approval_gate false: auto-advance from plan to execute
plan_approval_gate: true

# PR shipping control:
# pr_approval_gate true: require confirmation before /ship triggers commit + PR
# pr_approval_gate false: /ship proceeds immediately
pr_approval_gate: true

# ── API spend gate (flow utility calls: clarify, ship, ci-review) ─────────────
# These hit ANTHROPIC_API_KEY and cost real money. Block Agent spawns if
# today's total flow API spend exceeds this.
api_spend_gate_usd: 1.00

# ── Clean-state exit checks (Stop hook) ────────────────────────────────────────
# On session stop during these phases, run verification + artifact checks.
clean_state_check_phases:
  - verify
  - ship

# Require explicit approval before moving from plan -> execute.
plan_approval_gate: true

# Require explicit PR approval gate toggle before /ship.
pr_approval_gate: true

# When true, successful `/verify` in verify phase immediately runs `/ship`
# if the PR approval gate is off.
auto_ship_on_verify_pass: false

# Artifact patterns flagged as stale handoff noise when present in git status.
clean_state_artifact_patterns:
  - .log
  - .tmp
  - .DS_Store
  - __pycache__

# ── Subscription quota gate (Claude Code sessions) ───────────────────────────
# Claude Code runs against your claude.ai Pro/Max subscription; sessions cost
# $0 marginal. We warn (never hard-block — Anthropic enforces the real cap)
# when quota consumption hits this fraction of the 5-hour window limit.
subscription_quota_warn_pct: 0.80

# ── Subscription plan caps (messages per 5-hour window) ──────────────────────
# Set AP_PLAN in ~/.autopilot/.env to match your plan.
# These are approximate; adjust if Anthropic changes them.
plan_window_caps:
  pro:      { msgs: 45,   tokens_per_window: 2000000 }
  max5:     { msgs: 225,  tokens_per_window: 10000000 }
  max20:    { msgs: 900,  tokens_per_window: 40000000 }
  api_only: { msgs: 0,    tokens_per_window: 0 }

allowed_bash_commands:
  - git
  - pytest
  - python
  - python3
  - uv
  - pip
  - npm
  - npx
  - node
  - gh
  - cat
  - ls
  - find
  - grep
  - rg
  - head
  - tail
  - echo
  - mkdir
  - cp
  - mv
  - diff
  - wc
  - jq
  - curl

# Agent tool spawns only allowed during plan phase
agent_spawns_allowed_in:
  - plan

# Write operations restricted to project root
allowed_write_paths:
  - "./"
