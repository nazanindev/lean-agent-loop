max_steps_per_run: 30
max_tokens_per_step: 8000
context_warn_pct: 0.80

# Weighted step budget — each tool call deducts its weight from the budget.
tool_weights:
  Write: 2.0
  Edit: 1.5
  MultiEdit: 2.5
  Bash: 1.0
  Agent: 5.0
  Read: 0.25
  Glob: 0.1
  Grep: 0.1
  WebFetch: 0.5
  WebSearch: 0.5
  default: 1.0

# Per-phase step budgets (weighted). Overrides max_steps_per_run when set.
phase_step_budgets:
  plan: 15.0
  execute: 40.0
  verify: 15.0
  ship: 8.0

# When plan steps are parsed, max_steps = len(steps) * multiplier (min: max_steps_per_run).
plan_steps_multiplier: 3.0

# ── Auto-pipeline ─────────────────────────────────────────────────────────────
# All on by default. The pipeline runs prompt → plan → execute → verify → fix → ship
# without manual intervention. The PR is the review gate.
auto_verify_on_steps_complete: true   # run verify when all plan steps done
auto_check_before_ship: true          # run code review before ship
auto_remediate: true                  # spawn fix worker on verify/check failure
auto_remediate_max_tries: 2           # cap before surfacing failure to user

# ── API spend gate (flow utility calls: check, ship, ci-review) ───────────────
# These hit ANTHROPIC_API_KEY and cost real money.
api_spend_gate_usd: 1.00

# ── Agent spawn policy ────────────────────────────────────────────────────────
# smart: classify agents by tool capability + spend tier (recommended)
#   - read-only agents (no Write/Edit tools): allowed in any phase, any spend
#   - write-capable agents, low spend (< gate * 0.5): allowed in any phase
#   - write-capable agents, medium spend: allowed only in agent_spawns_allowed_in phases
#   - write-capable agents, high spend (>= gate): blocked
# phase_only: legacy behavior — only allow agents in agent_spawns_allowed_in phases
agent_spawn_policy: smart

# Phases where write-capable agents are allowed at medium spend tier (smart policy)
# or all agents are allowed (phase_only policy).
agent_spawns_allowed_in:
  - plan
  - execute

# ── Clean-state exit checks (Stop hook) ────────────────────────────────────────
clean_state_check_phases:
  - verify
  - ship

# Artifact patterns flagged as stale when present in git status.
clean_state_artifact_patterns:
  - .log
  - .tmp
  - .DS_Store
  - __pycache__

# ── Subscription quota gate (Claude Code sessions) ───────────────────────────
subscription_quota_warn_pct: 0.80

# ── Subscription plan caps (messages per 5-hour window) ──────────────────────
plan_window_caps:
  pro:      { msgs: 45,   tokens_per_window: 2000000 }
  max5:     { msgs: 225,  tokens_per_window: 10000000 }
  max20:    { msgs: 900,  tokens_per_window: 40000000 }
  api_only: { msgs: 0,    tokens_per_window: 0 }

allowed_bash_commands:
  - git
  - pytest
  - python
  - python3
  - uv
  - pip
  - npm
  - npx
  - node
  - gh
  - cat
  - ls
  - find
  - grep
  - rg
  - head
  - tail
  - echo
  - mkdir
  - cp
  - mv
  - diff
  - wc
  - jq
  - curl

# File edits allowed only during execute, verify, ship phases (plan is read-only)
edits_allowed_in:
  - execute
  - verify
  - ship

# Write operations restricted to project root
allowed_write_paths:
  - "./"
